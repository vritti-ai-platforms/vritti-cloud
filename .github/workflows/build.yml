name: Build & Push

# Auto-builds on merge to main via `nx affected`. Nothing touches the VM here —
# server images and the web .tar.gz both land in GHCR. The manual Deploy
# workflow (infrastructure repo) pulls + ships them.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Reusable workflows can't request more than the caller grants. The backend-image
# and web reusables push to GHCR, so the caller must hold packages: write.
permissions:
  contents: read
  packages: write

jobs:
  affected:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.aff.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - id: aff
        run: |
          PROJECTS=$(pnpm exec nx show projects --affected --type app --json)
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "Affected apps: $PROJECTS"

  # ---- Backend: build + push image to GHCR ----
  cloud-server:
    needs: affected
    if: contains(fromJSON(needs.affected.outputs.projects), 'vritti-cloud-server')
    uses: vritti-ai-platforms/infrastructure/.github/workflows/reusable-build-backend-image.yml@main
    with:
      service_name: cloud-server
      dockerfile_path: apps/cloud-server/Dockerfile
      build_context: .
      package_json_path: apps/cloud-server/package.json
    secrets: inherit

  # ---- Frontend: build + push .tar.gz to GHCR (oras) ----
  cloud-web:
    needs: affected
    if: contains(fromJSON(needs.affected.outputs.projects), 'vritti-cloud-web')
    uses: vritti-ai-platforms/infrastructure/.github/workflows/reusable-build-web.yml@main
    with:
      app_name: cloud-web
      build_command: pnpm exec nx build vritti-cloud-web
      output_dir: apps/cloud-web/dist
      production_domain: https://cloud.vrittiai.com
    secrets: inherit
