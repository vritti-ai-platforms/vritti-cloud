name: Build & Push

# Auto-builds on merge to main. Uses `nx affected` so only the apps that
# actually changed get built. Backend -> Docker image in GHCR.
# Frontend -> static bundle synced to the VM (safe; servers are gated by the
# separate manual Deploy workflow in the infrastructure repo).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.aff.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - id: aff
        run: |
          PROJECTS=$(pnpm exec nx show projects --affected --type app --json)
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "Affected apps: $PROJECTS"

  # ---- Backend: build + push image to GHCR (does NOT deploy) ----
  cloud-server:
    needs: affected
    if: contains(fromJSON(needs.affected.outputs.projects), 'vritti-cloud-server')
    uses: vritti-ai-platforms/infrastructure/.github/workflows/reusable-build-backend-image.yml@main
    with:
      service_name: cloud-server
      dockerfile_path: apps/cloud-server/Dockerfile
      build_context: .
      package_json_path: apps/cloud-server/package.json
    secrets: inherit

  # ---- Frontend: build static bundle (artifact) ----
  cloud-web-build:
    needs: affected
    if: contains(fromJSON(needs.affected.outputs.projects), 'vritti-cloud-web')
    uses: vritti-ai-platforms/infrastructure/.github/workflows/reusable-build-web.yml@main
    with:
      app_type: container
      app_name: cloud-web
      deploy_path: /
      build_command: pnpm exec nx build vritti-cloud-web
      output_dir: apps/cloud-web/dist
      production_domain: https://cloud.vrittiai.com
    secrets: inherit

  # ---- Frontend: sync static bundle to /opt/vritti/www/cloud ----
  cloud-web-deploy:
    needs: cloud-web-build
    uses: vritti-ai-platforms/infrastructure/.github/workflows/reusable-deploy-web-build.yml@main
    with:
      artifact_name: ${{ needs.cloud-web-build.outputs.artifact_name }}
      deploy_path: /opt/vritti/www/cloud
    secrets:
      SERVER_VM_HOST: ${{ secrets.SERVER_VM_HOST }}
      SERVER_VM_USER: ${{ secrets.SERVER_VM_USER }}
      SERVER_VM_SSH_KEY: ${{ secrets.SERVER_VM_SSH_KEY }}
